name: medrelay

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8000}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      DATABASE_URL: mysql+pymysql://${DB_USERNAME:-medrelay}:${DB_PASSWORD}@mysql:3306/${DB_DATABASE:-medrelay}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-medrelay}
      MYSQL_USER: ${DB_USERNAME:-medrelay}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
