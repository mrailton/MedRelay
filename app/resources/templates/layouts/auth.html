<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>MedRelay CAD - {% block title %}Sign in{% endblock %}</title>
    <link rel="stylesheet" href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600">
    <link rel="stylesheet" href="/static/assets/app.css">
    <script type="module" src="/static/assets/app.js"></script>
</head>
<body class="flex min-h-screen items-center justify-center bg-base-200 p-4">
    <div class="w-full max-w-sm">
        {% if error %}
        <div class="alert alert-error mb-4"><span>{{ error }}</span></div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
