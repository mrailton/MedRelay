<dialog id="{{ modal_id }}" class="modal">
    <div class="modal-box {{ modal_class | default('') }}">
        <form method="dialog">
            <button type="submit" class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2" aria-label="Close">✕</button>
        </form>
        <h3 class="mr-section-title mb-4">{{ modal_title }}</h3>
        <form method="POST" action="{{ modal_form_action }}" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            {{ modal_content | safe if modal_content is defined else '' }}
            {% block modal_body %}{% endblock %}
            <div class="modal-action">
                <button type="button" class="btn" onclick="document.getElementById('{{ modal_id }}').close()">Cancel</button>
                <button type="submit" class="btn btn-primary">{{ modal_submit_label | default('Save') }}</button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button type="submit">close</button></form>
</dialog>
