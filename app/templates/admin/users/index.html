{% extends "layouts/app.html" %}
{% block title %}Users{% endblock %}
{% block content %}
<div class="flex justify-between mb-6">
    <h1 class="text-2xl font-bold">Users</h1>
    <a href="{{ url_for('admin.users.create') }}" class="btn btn-primary">New User</a>
</div>
<table class="table bg-base-100 shadow-sm">
    <thead><tr><th>Name</th><th>Email</th><th>Role</th></tr></thead>
    <tbody>{% for u in users %}<tr><td>{{ u.name }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td></tr>{% endfor %}</tbody>
</table>
{% endblock %}
