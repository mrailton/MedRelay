{% extends "layouts/app.html" %}
{% block title %}Create Organisation{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Create Organisation</h1>
<form method="POST" action="{{ url_for('admin.organisations.store') }}" class="card bg-base-100 max-w-lg shadow-sm">
    <div class="card-body space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="text" name="code" placeholder="Code (short identifier)" class="input input-bordered w-full" required value="{{ code or '' }}" />
        {% if errors.get('code') %}<p class="text-error text-sm">{{ errors.code }}</p>{% endif %}
        <input type="text" name="name" placeholder="Name" class="input input-bordered w-full" required value="{{ name or '' }}" />
        <button type="submit" class="btn btn-primary">Create</button>
    </div>
</form>
{% endblock %}
