<dialog id="{{ id }}" class="modal">
    <div class="modal-box">
        <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button></form>
        <h3 class="text-lg font-bold mb-4">{{ title }}</h3>
        <form method="POST" action="{{ form_action }}" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            {{ caller() if caller is defined else '' }}
            {{ content | safe if content is defined else '' }}
            {% block modal_body %}{% endblock %}
            <div class="modal-action">
                <button type="submit" class="btn btn-primary">{{ submit_label | default('Save') }}</button>
                <button type="button" class="btn" onclick="document.getElementById('{{ id }}').close()">Cancel</button>
            </div>
        </form>
    </div>
</dialog>
