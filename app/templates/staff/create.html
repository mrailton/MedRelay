{% extends "layouts/app.html" %}
{% block title %}Add Staff{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Add Staff</h1>
<form method="POST" action="{{ url_for('staff.store') }}" class="card bg-base-100 max-w-lg shadow-sm">
    <div class="card-body space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="text" name="first_name" class="input input-bordered w-full" placeholder="First name" required />
        <input type="text" name="last_name" class="input input-bordered w-full" placeholder="Last name" required />
        <select name="clinical_level" class="select select-bordered w-full" required>
            {% for l in ClinicalLevel %}<option value="{{ l.value }}">{{ l.label() }}</option>{% endfor %}
        </select>
        <textarea name="notes" class="textarea textarea-bordered w-full"></textarea>
        <button type="submit" class="btn btn-primary">Save</button>
    </div>
</form>
{% endblock %}
